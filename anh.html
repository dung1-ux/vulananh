<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Những Kỷ Niệm ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    min-height:100vh;
    overflow:hidden;
    position:relative;
}

.photo{
    position:absolute;
    width:200px;
    background:white;
    padding:10px;
    border-radius:8px;
    box-shadow:0 10px 25px rgba(0,0,0,.3);
    transition:.5s;
    z-index:1;
}

.photo img{
    width:100%;
    display:block;
    border-radius:3px;
}

.photo:hover{
    transform:scale(1.1) rotate(0deg) !important;
    z-index:999;
}

/* Vị trí ảnh */
.p1{
    top:8%;
    left:8%;
    transform:rotate(-15deg);
}

.p2{
    top:15%;
    right:12%;
    transform:rotate(12deg);
}

.p3{
    top:40%;
    left:20%;
    transform:rotate(-8deg);
}

.p4{
    top:50%;
    right:18%;
    transform:rotate(18deg);
}

.p5{
    bottom:8%;
    left:38%;
    transform:rotate(-12deg);
}
.p6{
    top:5%;
    left:40%;
    transform:rotate(8deg);
}

.p7{
    top:30%;
    left:60%;
    transform:rotate(-20deg) scale(0.8);
}

.p8{
    bottom:20%;
    left:5%;
    transform:rotate(15deg);
}

.p9{
    bottom:5%;
    right:5%;
    transform:rotate(-10deg);
}
</style>
</head>
<body>

<div class="photo p1">
    <img src="img/image1.png">
</div>

<div class="photo p2">
    <img src="img/image2.png">
</div>

<div class="photo p3">
    <img src="img/image3.png">
</div>

<div class="photo p4">
    <img src="img/image4.png">
</div>

<div class="photo p5">
    <img src="img/image5.png">
</div>
<div class="photo p6">
    <img src="img/image.png">
</div>



</body>
</html>
