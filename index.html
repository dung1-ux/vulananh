<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    overflow:hidden;
}

.container{
    text-align:center;
    width:90%;
    z-index:10;
}

.text{
    color:white;
    font-size:2rem;
    font-weight:bold;
    text-shadow:0 0 15px rgba(255,255,255,.5);
    min-height:80px;
}

.final{
    font-size:4rem;
    color:#fff;
    opacity:0;
    transform:scale(0.5);
    transition:1.5s;
    text-shadow:
        0 0 10px #fff,
        0 0 20px #fff,
        0 0 40px #ffcc00;
}

.show{
    opacity:1;
    transform:scale(1);
}

.cursor{
    animation:blink .8s infinite;
}

@keyframes blink{
    50%{
        opacity:0;
    }
}

.heart{
    position:absolute;
    color:white;
    animation:float 6s linear infinite;
    pointer-events:none;
}

@keyframes float{
    from{
        transform:translateY(100vh) scale(0);
        opacity:1;
    }
    to{
        transform:translateY(-100px) scale(1.5);
        opacity:0;
    }
}

.next-btn{
    margin-top:35px;
    padding:15px 40px;
    border:none;
    border-radius:50px;
    background:#fff;
    color:#ff4f81;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;

    opacity:0;
    transform:translateY(30px);

    transition:all .8s ease;
    box-shadow:0 0 25px rgba(255,255,255,.7);
}

.next-btn.show{
    opacity:1;
    transform:translateY(0);
}

.next-btn:hover{
    transform:scale(1.1);
    box-shadow:0 0 35px rgba(255,255,255,1);
}
</style>

</head>
<body>

<div class="container">


<div id="typing" class="text"></div>

<h1 id="finalText" class="final">
    🎂 Happy Birthday My Love ❤️
</h1>

<button id="nextBtn" class="next-btn">
    Tiếp Theo ➜
</button>


</div>

<script>

const lines = [
    "Hôm nay ngày 6 tháng 4 năm 2026...",
    "Là sinh nhật của người con gái anh yêu nhất ❤️"
];

const typing = document.getElementById("typing");
const finalText = document.getElementById("finalText");
const nextBtn = document.getElementById("nextBtn");

let lineIndex = 0;
let charIndex = 0;

function typeWriter(){

    if(lineIndex < lines.length){

        if(charIndex < lines[lineIndex].length){

            typing.innerHTML =
                lines[lineIndex].substring(0,charIndex + 1) +
                '<span class="cursor">|</span>';

            charIndex++;
            setTimeout(typeWriter,100);

        }else{

            setTimeout(()=>{

                charIndex = 0;
                lineIndex++;

                if(lineIndex < lines.length){

                    typing.innerHTML = "";
                    typeWriter();

                }else{

                    typing.style.opacity = "0";

                    setTimeout(()=>{

                        typing.style.display = "none";

                        finalText.classList.add("show");

                        setTimeout(()=>{
                            nextBtn.classList.add("show");
                        },1500);

                    },1000);
                }

            },1800);
        }
    }
}

typeWriter();

function createHeart(){

    const heart = document.createElement("div");

    heart.className = "heart";
    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 25 + 15) + "px";
    heart.style.animationDuration = (Math.random() * 3 + 4) + "s";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },7000);
}

setInterval(createHeart,300);

nextBtn.addEventListener("click",()=>{
    window.location.href = "birthday.html";
});

</script>

</body>
</html>
